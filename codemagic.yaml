# Codemagic CI config — builds & ships Tidal (Capacitor) to TestFlight/App Store
# WITHOUT needing a Mac on your end.
#
# SETUP (one time): add your App Store Connect API key as a secure variable
# group named "appstore" in Codemagic (see the steps your assistant gave you):
#   APP_STORE_CONNECT_ISSUER_ID       = the Issuer ID (a UUID)
#   APP_STORE_CONNECT_KEY_IDENTIFIER  = the Key ID (~10 chars)
#   APP_STORE_CONNECT_PRIVATE_KEY     = the FULL contents of the .p8 file
#                                       (including the BEGIN/END lines)
#   CERTIFICATE_PRIVATE_KEY           = the full contents of cert_private_key.pem
#                                       (generated locally; reused every build)
# Mark them all "Secure". Then set BUNDLE_ID below to match capacitor.config.json.
# NOTE: the App Store Connect API key must have ADMIN access to create the
# distribution certificate & provisioning profile.

workflows:
  ios-tidal:
    name: Tidal iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore          # the variable group you create in the Codemagic UI
      vars:
        BUNDLE_ID: "com.mschaefer20.tidal"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform (if not committed)
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
      - name: Sync web assets + plugins into the native project
        script: npx cap sync ios
      - name: Make the app iPhone-only (no iPad)
        script: node ci/iphone-only.js
      - name: Enable Game Center capability
        script: node ci/enable-gamecenter.js
      - name: Configure Info.plist (compliance + portrait lock)
        script: |
          PLIST=ios/App/App/Info.plist
          # Encryption compliance (no custom encryption)
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          # Portrait only (applies to iPhone and iPad)
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          # Remove any iPad-specific orientation list and opt out of iPad
          # multitasking so portrait-only is allowed (Apple validation 90474).
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST"
      - name: Configure audio session (play through the mute switch)
        script: node ci/configure-audio.js
      - name: Generate app icon & splash
        script: npx capacitor-assets generate --ios || true
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Fetch signing files & set up keychain (uses the API key)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key="@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number (Codemagic's monotonic build counter)
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Upload only. The build is then available to INTERNAL TestFlight testers
        # immediately (no beta review). To enable EXTERNAL testers, fill in the
        # TestFlight test info in App Store Connect, then set this to true.
        submit_to_testflight: false
        # submit_to_app_store: false   # flip to true once you're ready to release
